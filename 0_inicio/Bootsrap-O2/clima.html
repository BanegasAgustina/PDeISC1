<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDQ Clima</title>

    <!-- NAVBAR -->

            <a class="navbar-brand fw-bold fs-2" href="index.html">0223</a>
            <a href="contacto.html" class="text-white fw-bold fs-4 text-decoration-none">Contacto</a>
        </div>
    </nav>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="container mt-4">
        <div class="row g-4 align-items-start">

            <!-- Video -->
            <div class="col-12 col-lg-6">
                <div class="ratio ratio-16x9">
                  <iframe width="560" height="315" src="https://www.youtube.com/embed/ke0uERoRzYM?si=pWYG2ilrYaplssDg"

                </div>
            </div>
            <div class="col-12 col-lg-6">
                <div class="ratio ratio-16x9">
                  <iframe width="560" height="315" src="https://www.youtube.com/embed/ke0uERoRzYM?si=pWYG2ilrYaplssDg"

            <div class="col-12 col-lg-6">

                    <div class="d-flex justify-content-between align-items-center">

                        <!-- Temperatura -->
                        <div>
                            <h3 class="fw-bold text-uppercase mb-1">Hoy</h3>
                            <p class="display-4 fw-bold mb-1">19° - 22°</p>

                        </div>

                        <!-- Info adicional -->
                        <div>
                            <p class="mb-2"><span class="fw-semibold">Humedad:</span> 94%</p>
                            <p class="mb-2"><span class="fw-semibold">Viento:</span> 14 km/h</p>
                            <p class="mb-2"><span class="fw-semibold">Presión:</span> 1010 hPa</p>
                            <p class="mb-2"><span class="fw-semibold">Visibilidad:</span> 10 km</p>
                        </div>

                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <footer class="mt-5 py-3 text-white d-flex justify-content-between px-4" style="background-color: #d6001c;">
