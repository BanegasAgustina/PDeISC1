<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactanos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark" style="background-color: #d6001c;">
        <div class="container-fluid px-4">
            <a href="clima.html" class="text-white fw-bold fs-5 text-decoration-none">Clima 20°</a>
            <a class="navbar-brand fw-bold fs-2" href="index.html">0223</a>
            <a href="contacto.html" class="text-white fw-bold fs-5 text-decoration-none">Contacto</a>
        </div>
    </nav>

    <!-- FORMULARIO -->
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">

                <form id="contactForm" class="needs-validation card border-0 shadow-sm p-4" novalidate>
                    <h3 class="mb-4">Contactanos</h3>

                    <!-- Nombre -->
                    <div class="mb-3">
                        <label class="form-label">Nombre completo</label>
                        <input
                            type="text"
                            id="nombreInput"
                            class="form-control"
                            placeholder="Tu nombre aquí"
                            required>
                        <div class="invalid-feedback" id="nombreError">
                            Por favor ingresá tu nombre (solo letras y espacios).
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input
                            type="email"
                            id="emailInput"
                            class="form-control"
                            placeholder="nombre@gmail.com"
                            required>
                        <div class="invalid-feedback" id="emailError">
                            Solo se aceptan correos @gmail.com o @hotmail.com.
                        </div>
                    </div>

                    <!-- Asunto -->
                    <div class="mb-3">
                        <label class="form-label">Asunto</label>
                        <select class="form-select" required>
                            <option value="" disabled selected>Seleccioná una opción</option>
                            <option>Consulta general</option>
                            <option>Soporte técnico</option>
                            <option>Ventas</option>
                            <option>Otro</option>
                        </select>
                        <div class="invalid-feedback">Seleccioná un asunto.</div>
                    </div>

                    <!-- Mensaje -->
                    <div class="mb-4">
                        <label class="form-label">Mensaje</label>
                        <textarea
                            id="mensajeInput"
                            class="form-control"
                            rows="4"
                            placeholder="Escribí tu mensaje aquí..."
                            maxlength="500"
                            required></textarea>
                        <div class="d-flex justify-content-between align-items-center mt-1">
                            <div class="invalid-feedback d-block" id="mensajeError" style="visibility: hidden;">
                                Por favor escribí tu mensaje.
                            </div>
                            <small id="charCount" class="text-muted ms-auto">0 / 500</small>
                        </div>
                    </div>

                    <!-- Botón -->
                    <div class="text-end">
                        <button type="submit" class="btn text-white px-4" style="background-color: #d6001c;">
                            Enviar mensaje
                        </button>
                    </div>

                </form>

            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="text-white py-3 mt-5" style="background-color: #d6001c;">
        <div class="container d-flex justify-content-between">
            <span>Agustina Banegas</span>
            <span>Noticias día a día</span>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // --- Contador de caracteres ---
        const mensajeInput = document.getElementById('mensajeInput');
        const charCount = document.getElementById('charCount');
        const mensajeError = document.getElementById('mensajeError');

        mensajeInput.addEventListener('input', () => {
            const len = mensajeInput.value.length;
            charCount.textContent = `${len} / 500`;
            charCount.classList.toggle('text-danger', len >= 490);
        });

        // --- Bloquear números y caracteres especiales en nombre (también al pegar) ---
        const nombreInput = document.getElementById('nombreInput');

        nombreInput.addEventListener('keypress', (e) => {
            const char = e.key;
            if (!/^[a-zA-ZáéíóúÁÉÍÓÚüÜñÑ\s]$/.test(char)) {
                e.preventDefault();
            }
        });

        nombreInput.addEventListener('paste', (e) => {
            e.preventDefault();
            const pasted = (e.clipboardData || window.clipboardData).getData('text');
            const cleaned = pasted.replace(/[^a-zA-ZáéíóúÁÉÍÓÚüÜñÑ\s]/g, '');
            document.execCommand('insertText', false, cleaned);
        });

        // --- Validación del email ---
        const emailInput = document.getElementById('emailInput');

        function validarEmail() {
            const val = emailInput.value.trim().toLowerCase();
            const valido = /^[^\s@]+@(gmail\.com|hotmail\.com)$/.test(val);
            if (!valido) {
                emailInput.setCustomValidity('Correo no válido');
            } else {
                emailInput.setCustomValidity('');
            }
        }

        emailInput.addEventListener('input', validarEmail);

        // --- Validación al enviar ---
        (() => {
            'use strict';
            const form = document.getElementById('contactForm');

            form.addEventListener('submit', event => {
                validarEmail();

                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();

                    // Mostrar error del mensaje manualmente
                    if (mensajeInput.value.trim() === '') {
                        mensajeError.style.visibility = 'visible';
                        mensajeError.textContent = 'Por favor escribí tu mensaje.';
                    }
                } else {
                    mensajeError.style.visibility = 'hidden';
                }

                form.classList.add('was-validated');
            }, false);

            mensajeInput.addEventListener('input', () => {
                if (mensajeInput.value.trim() !== '') {
                    mensajeError.style.visibility = 'hidden';
                }
            });
        })();
    </script>

</body>
</html>
