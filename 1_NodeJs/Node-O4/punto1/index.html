<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios push()</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 🔥 CLAVE: defer -->
    <script src="punto1.js" defer></script>
</head>

<body class="bg-light">

    <div class="container py-5">
        <h1 class="text-center mb-4 text-primary">Ejercicios con push()</h1>

        <div class="row g-3">

            <div class="col-12 col-md-4">
                <button id="btnFrutas" class="btn btn-primary w-100">
                    Agregar frutas
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnAmigos" class="btn btn-success w-100">
                    Agregar amigos
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarNumeros" class="btn btn-info w-100">
                    Ver lista de números
                </button>
            </div>

            <div class="col-12 col-md-4">
                <div class="input-group">
                    <input type="number" id="inputNumero" class="form-control" placeholder="Número">
                    <button id="btnNumeros" class="btn btn-warning">
                        Agregar
                    </button>
                </div>
            </div>

        </div>

        <div class="mt-4">
            <h4>Resultado:</h4>
            <div id="resultado" class="bg-dark text-white p-3 rounded"></div>
        </div>
    </div>

</body>
</html>
