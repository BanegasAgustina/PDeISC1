<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios filter()</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">
        <h1 class="text-center mb-4 text-primary">Ejercicios con filter()</h1>
        <div class="row g-3">

            <!-- Ver arrays -->
            <div class="col-12 col-md-4">
                <button id="btnMostrarNumeros" class="btn btn-primary w-100">
                    Ver números
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarPalabras" class="btn btn-success w-100">
                    Ver palabras
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarUsuarios" class="btn btn-warning w-100">
                    Ver usuarios
                </button>
            </div>

            <!-- Acciones filter() -->
            <div class="col-12 col-md-4">
                <button id="btnFiltrarMayores10" class="btn btn-outline-primary w-100">
                    Filtrar mayores a 10
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnFiltrarPalabrasLargas" class="btn btn-outline-success w-100">
                    Filtrar más de 5 letras
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnFiltrarActivos" class="btn btn-outline-warning w-100">
                    Filtrar usuarios activos
                </button>
            </div>

        </div>

        <div class="mt-4">
            <h4>Resultado:</h4>
            <div id="resultado" class="bg-dark text-white p-3 rounded"></div>
        </div>
    </div>

    <script src="punto11.js"></script>

</body>

</html>
