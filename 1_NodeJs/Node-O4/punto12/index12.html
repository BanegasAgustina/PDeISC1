<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios reduce()</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">
        <h1 class="text-center mb-4 text-primary">Ejercicios con reduce()</h1>
        <div class="row g-3">

            <!-- Ver arrays -->
            <div class="col-12 col-md-4">
                <button id="btnMostrarSuma" class="btn btn-primary w-100">
                    Ver números (suma)
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarMulti" class="btn btn-success w-100">
                    Ver números (multiplicar)
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarProductos" class="btn btn-warning w-100">
                    Ver productos
                </button>
            </div>

            <!-- Acciones reduce() -->
            <div class="col-12 col-md-4">
                <button id="btnSumar" class="btn btn-outline-primary w-100">
                    Sumar todos los elementos
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMultiplicar" class="btn btn-outline-success w-100">
                    Multiplicar todos los elementos
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnTotalPrecios" class="btn btn-outline-warning w-100">
                    Obtener total de precios
                </button>
            </div>

        </div>

        <div class="mt-4">
            <h4>Resultado:</h4>
            <div id="resultado" class="bg-dark text-white p-3 rounded"></div>
        </div>
    </div>

    <script src="punto12.js"></script>

</body>

</html>
