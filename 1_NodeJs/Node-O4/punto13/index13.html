<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios sort()</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">
        <h1 class="text-center mb-4 text-primary">Ejercicios con sort()</h1>

        <div class="row g-3">

            <!-- Ver arrays -->
            <div class="col-12 col-md-4">
                <button id="btnMostrarNumeros" class="btn btn-primary w-100">
                    Ver números
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarPalabras" class="btn btn-success w-100">
                    Ver palabras
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarPersonas" class="btn btn-warning w-100">
                    Ver personas
                </button>
            </div>

            <!-- Acciones sort() -->
            <div class="col-12 col-md-4">
                <button id="btnOrdenarNumeros" class="btn btn-outline-primary w-100">
                    Ordenar de menor a mayor
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnOrdenarPalabras" class="btn btn-outline-success w-100">
                    Ordenar alfabéticamente
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnOrdenarEdad" class="btn btn-outline-warning w-100">
                    Ordenar por edad
                </button>
            </div>

        </div>

        <div class="mt-4">
            <h4>Resultado:</h4>
            <div id="resultado" class="bg-dark text-white p-3 rounded"></div>
        </div>
    </div>

    <script src="punto13.js"></script>

</body>

</html>
