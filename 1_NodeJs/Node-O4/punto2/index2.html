<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios pop()</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">
        <h1 class="text-center mb-4 text-primary">Ejercicios con pop()</h1>

        <div class="row g-3">

            <div class="col-12 col-md-4">
                <button id="btnMostrarAnimales" class="btn btn-primary w-100">
                    Ver animales
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarCompras" class="btn btn-success w-100">
                    Ver lista de compras
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarColores" class="btn btn-info w-100">
                    Ver colores
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnAnimales" class="btn btn-outline-primary w-100">
                    Eliminar último animal
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnCompras" class="btn btn-outline-success w-100">
                    Quitar último producto
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnVaciar" class="btn btn-danger w-100">
                    Vaciar colores
                </button>
            </div>

        </div>

        <div class="mt-4">
            <h4>Resultado:</h4>
            <div id="resultado" class="bg-dark text-white p-3 rounded"></div>
        </div>
    </div>

    <script src="punto2.js"></script>

</body>

</html>
