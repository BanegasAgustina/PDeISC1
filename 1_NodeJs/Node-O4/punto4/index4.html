<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios shift()</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">
        <h1 class="text-center mb-4 text-primary">Ejercicios con shift()</h1>
        

        <div class="row g-3">

            <!-- Ver -->
            <div class="col-12 col-md-4">
                <button id="btnMostrarNumeros" class="btn btn-primary w-100">
                    Ver números
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarMensajes" class="btn btn-success w-100">
                    Ver mensajes
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarCola" class="btn btn-warning w-100">
                    Ver cola de atención
                </button>
            </div>

            <!-- Eliminar -->
            <div class="col-12 col-md-4">
                <button id="btnNumeros" class="btn btn-outline-primary w-100">
                    Quitar primer número
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMensajes" class="btn btn-outline-success w-100">
                    Eliminar primer mensaje
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnAtender" class="btn btn-outline-warning w-100">
                    Atender siguiente cliente
                </button>
            </div>

        </div>

        <div class="mt-4">
            <h4>Resultado:</h4>
            <div id="resultado" class="bg-dark text-white p-3 rounded"></div>
        </div>
    </div>

    <script src="punto4.js"></script>

</body>

</html>
