<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios includes()</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">
        <h1 class="text-center mb-4 text-primary">Ejercicios con includes()</h1>


        <div class="row g-3">

            <!-- Ver -->
            <div class="col-12 col-md-4">
                <button id="btnMostrarUsuarios" class="btn btn-primary w-100">
                    Ver usuarios
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarColores" class="btn btn-success w-100">
                    Ver colores
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarNumeros" class="btn btn-warning w-100">
                    Ver números
                </button>
            </div>

            <!-- Acciones includes() -->
            <div class="col-12 col-md-4">
                <button id="btnBuscarAdmin" class="btn btn-outline-primary w-100">
                    Comprobar "admin"
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnBuscarVerde" class="btn btn-outline-success w-100">
                    Comprobar "verde"
                </button>
            </div>

            <div class="col-12 col-md-4">
                <div class="input-group">
                    <input type="number" id="inputNumero" class="form-control" placeholder="Número">
                    <button id="btnAgregarNumero" class="btn btn-outline-warning">
                        Verificar y agregar
                    </button>
                </div>
            </div>

        </div>

        <div class="mt-4">
            <h4>Resultado:</h4>
            <div id="resultado" class="bg-dark text-white p-3 rounded"></div>
        </div>
    </div>

    <script src="punto8.js"></script>

</body>

</html>
