<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Node Módulos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 40px 60px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 80%;
            max-width: 900px;
        }

        h1 {
            color: #2d3748;
            margin-top: 0;
        }

        p {
            color: #4a5568;
        }

        .menu ul {
            list-style: none;
            padding: 0;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .menu a {
            text-decoration: none;
            background: #3182ce;
            color: white;
            padding: 10px 18px;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s ease;
            display: inline-block;
        }

        .menu a:hover {
            background: #2b6cb0;
        }

        @media (max-width: 768px) {
            .container {
                width: 95%;
                padding: 30px 20px;
            }

            .menu ul {
                flex-direction: column;
                align-items: center;
            }

            .menu a {
                width: 80%;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 20px 15px;
            }

            .menu a {
                width: 100%;
                font-size: 14px;
                padding: 10px;
            }

            h1 {
                font-size: 22px;
            }

            p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        {{MENU}}
        {{CONTENIDO}}
    </div>
</body>
</html>
