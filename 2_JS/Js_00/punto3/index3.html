<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios unshift()</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">
        <h1 class="text-center mb-4 text-primary">Ejercicios con unshift()</h1>
        <div class="row g-3">

            <!-- Colores -->
            <div class="col-12 col-md-4">
                <button id="btnMostrarColores" class="btn btn-primary w-100">
                    Ver colores
                </button>
            </div>

            <!-- Tareas -->
            <div class="col-12 col-md-4">
                <button id="btnMostrarTareas" class="btn btn-success w-100">
                    Ver tareas
                </button>
            </div>

            <!-- Usuarios -->
            <div class="col-12 col-md-4">
                <button id="btnMostrarUsuarios" class="btn btn-info w-100">
                    Ver usuarios conectados
                </button>
            </div>

            <!-- Agregar colores -->
            <div class="col-12 col-md-4">
                <button id="btnColores" class="btn btn-outline-primary w-100">
                    Agregar colores al principio
                </button>
            </div>

            <!-- Agregar tarea urgente -->
            <div class="col-12 col-md-4">
                <div class="input-group">
                    <input type="text" id="inputTarea" class="form-control" placeholder="Tarea urgente">
                    <button id="btnTarea" class="btn btn-outline-success">
                        Agregar
                    </button>
                </div>
            </div>

            <!-- Agregar usuario -->
            <div class="col-12 col-md-4">
                <div class="input-group">
                    <input type="text" id="inputUsuario" class="form-control" placeholder="Nombre usuario">
                    <button id="btnUsuario" class="btn btn-outline-info">
                        Conectar
                    </button>
                </div>
            </div>

        </div>

        <div class="mt-4">
            <h4>Resultado:</h4>
            <div id="resultado" class="bg-dark text-white p-3 rounded"></div>
        </div>
    </div>

    <script src="punto3.js"></script>

</body>

</html>
