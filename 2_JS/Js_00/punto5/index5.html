<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios splice()</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">
        <h1 class="text-center mb-4 text-primary">Ejercicios con splice()</h1>

        <div class="row g-3">

            <!-- Ver -->
            <div class="col-12 col-md-4">
                <button id="btnMostrarLetras" class="btn btn-primary w-100">
                    Ver letras
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarNombres" class="btn btn-success w-100">
                    Ver nombres
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarProductos" class="btn btn-warning w-100">
                    Ver productos
                </button>
            </div>

            <!-- Acciones -->
            <div class="col-12 col-md-4">
                <button id="btnEliminarLetras" class="btn btn-outline-primary w-100">
                    Eliminar 2 desde posición 1
                </button>
            </div>

            <div class="col-12 col-md-4">
                <div class="input-group">
                    <input type="text" id="inputNombre" class="form-control" placeholder="Nuevo nombre">
                    <button id="btnInsertarNombre" class="btn btn-outline-success">
                        Insertar en pos. 2
                    </button>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="input-group">
                    <input type="number" id="inputPosicion" class="form-control" placeholder="Posición">
                    <button id="btnReemplazar" class="btn btn-outline-warning">
                        Reemplazar 2
                    </button>
                </div>
            </div>

        </div>

        <div class="mt-4">
            <h4>Resultado:</h4>
            <div id="resultado" class="bg-dark text-white p-3 rounded"></div>
        </div>
    </div>
   

    <script src="punto5.js"></script>

</body>

</html>
