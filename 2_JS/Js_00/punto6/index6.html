<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios slice()</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">
        <h1 class="text-center mb-4 text-primary">Ejercicios con slice()</h1>
        <div class="row g-3">

            <!-- Ver -->
            <div class="col-12 col-md-4">
                <button id="btnMostrarNumeros" class="btn btn-primary w-100">
                    Ver números
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarPeliculas" class="btn btn-success w-100">
                    Ver películas
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarFrutas" class="btn btn-warning w-100">
                    Ver frutas
                </button>
            </div>

            <!-- Acciones slice() -->
            <div class="col-12 col-md-4">
                <button id="btnPrimeros3" class="btn btn-outline-primary w-100">
                    Copiar primeros 3
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnParcialPeliculas" class="btn btn-outline-success w-100">
                    Copiar posición 2 hasta 4
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnUltimos3" class="btn btn-outline-warning w-100">
                    Copiar últimos 3
                </button>
            </div>

        </div>

        <div class="mt-4">
            <h4>Resultado:</h4>
            <div id="resultado" class="bg-dark text-white p-3 rounded"></div>
        </div>
    </div>

    <script src="punto6.js"></script>

</body>

</html>
