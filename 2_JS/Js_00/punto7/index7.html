<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios indexOf()</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">
        <h1 class="text-center mb-4 text-primary">Ejercicios con indexOf()</h1>
        <p class="text-center text-muted mb-5">Haz clic en los botones para ejecutar las funciones básicas de
            JavaScript.</p>

        <div class="row g-3">

            <!-- Ver -->
            <div class="col-12 col-md-4">
                <button id="btnMostrarAnimales" class="btn btn-primary w-100">
                    Ver animales
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarNumeros" class="btn btn-success w-100">
                    Ver números
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnMostrarCiudades" class="btn btn-warning w-100">
                    Ver ciudades
                </button>
            </div>

            <!-- Acciones indexOf() -->
            <div class="col-12 col-md-4">
                <button id="btnBuscarPerro" class="btn btn-outline-primary w-100">
                    Buscar "perro"
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnBuscar50" class="btn btn-outline-success w-100">
                    Verificar si 50 está
                </button>
            </div>

            <div class="col-12 col-md-4">
                <button id="btnBuscarMadrid" class="btn btn-outline-warning w-100">
                    Buscar "Madrid"
                </button>
            </div>

        </div>

        <div class="mt-4">
            <h4>Resultado:</h4>
            <div id="resultado" class="bg-dark text-white p-3 rounded"></div>
        </div>
    </div>

    <script src="punto7.js"></script>

</body>

</html>
