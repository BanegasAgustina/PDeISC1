<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Master | Gestión de Inventario Profesional</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/style/style2.css">
</head>
<body>

    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="fas fa-boxes me-2"></i>STOCK MASTER
            </a>
        </div>
    </nav>

    <main class="container mb-5">
        <div class="row g-4">
            <!-- Formulario de Registro (8+ campos) -->
            <div class="col-lg-5">
                <div class="card p-4">
                    <h4 class="fw-bold mb-4 text-primary">Registrar Nuevo Item</h4>
                    <form id="formStock" novalidate>
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label class="form-label small fw-bold text-muted">NOMBRE DEL PRODUCTO</label>
                                <input type="text" id="producto" name="producto" class="form-control" placeholder="Ej: Pelota voley" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold text-muted">CATEGORÍA</label>
                                <select id="categoria" name="categoria" class="form-select" required>
                                    <option value="" disabled selected>Elegir...</option>
                                    <option value="Herramientas">Herramientas</option>
                                    <option value="Deportes">Deportes</option>
                                    <option value="Electrónica">Electrónica</option>
                                    <option value="Hogar">Hogar</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold text-muted">CÓDIGO (SKU)</label>
                                <input type="text" id="codigo" name="codigo" class="form-control" placeholder="ABC-123" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold text-muted">PRECIO ($)</label>
                                <input type="number" id="precio" name="precio" class="form-control" placeholder="0.00" min="0" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold text-muted">CANTIDAD</label>
                                <input type="number" id="cantidad" name="cantidad" class="form-control" placeholder="0" min="0" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold text-muted">PROVEEDOR</label>
                                <input type="text" id="proveedor" name="proveedor" class="form-control" placeholder="Nombre Proveedor">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label small fw-bold text-muted">FECHA INGRESO</label>
                                <input type="date" id="fechaIngreso" name="fechaIngreso" class="form-control" required>
                            </div>

                        
                            <div class="col-md-12 mb-4">
                                <label class="form-label small fw-bold text-muted">MÉTODO DE ALMACENAJE (JS Demo)</label>
                                <div class="d-flex gap-2">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="metodoGuardado" id="metodoPush" value="push" checked>
                                        <label class="form-check-label small" for="metodoPush">push()</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="metodoGuardado" id="metodoUnshift" value="unshift">
                                        <label class="form-check-label small" for="metodoUnshift">unshift()</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="metodoGuardado" id="metodoSpread" value="spread">
                                        <label class="form-check-label small" for="metodoSpread">Spread [...]</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="metodoGuardado" id="metodoSplice" value="splice">
                                        <label class="form-check-label small" for="metodoSplice">splice()</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold">
                            <i class="fas fa-save me-2"></i>GUARDAR EN STOCK
                        </button>
                    </form>

                    <!-- Mensajes de estado dinámicos -->
                    <div id="statusMsg" class="mt-3"></div>
                </div>
            </div>

            <!-- Listado de Stock -->
            <div class="col-lg-7">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="fw-bold m-0">Inventario Actual</h4>
                    <span id="itemCount" class="badge bg-dark rounded-pill">0 Items</span>
                </div>
                
                <div id="stockList" class="list-group list-group-flush shadow-sm rounded-4 overflow-hidden">
                    <!-- Dinámico -->
                </div>

                <div id="emptyList" class="text-center py-5 bg-white rounded-4 mt-2">
                    <i class="fas fa-search fa-3x text-light mb-3"></i>
                    <p class="text-muted">No hay productos en el stock.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Botón Ir al Inicio -->
    <button id="scrollTopBtn" class="btn btn-primary rounded-circle shadow-lg" title="Ir al inicio">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="/script/proyecto2.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
