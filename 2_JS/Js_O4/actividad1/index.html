<!doctype html>
<!-- Pagina unica de la actividad 1. -->
<html lang="es" data-bs-theme="light">
  <head>
    <!-- Configuracion basica para idioma, caracteres y responsive. -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Actividad 1 - Fetch y Axios</title>
    <!-- Bootstrap se usa para el diseno responsive. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Estilos propios compartidos entre actividades. -->
    <link rel="stylesheet" href="/assets/common.css">
  </head>
  <body>
    <!-- Barra superior con titulo de la actividad y cambio de tema. -->
    <nav class="navbar navbar-expand-lg border-bottom bg-body">
      <div class="container">
        <span class="navbar-brand fw-bold">Actividad 1</span>
        <button class="btn btn-outline-secondary btn-sm" id="themeToggle" type="button">Modo oscuro</button>
      </div>
    </nav>

    <!-- Contenido principal de la pagina. -->
    <main class="container py-4 py-lg-5">
      <!-- Encabezado y botones para elegir fetch o axios. -->
      <div class="toolbar mb-4">
        <div>
          <p class="text-uppercase text-primary fw-semibold small mb-1">Actividad 1</p>
          <h1 class="h2 fw-bold mb-1">Obtener usuarios con fetch y axios</h1>
          <p class="muted mb-0">Se muestran nombres y emails desde JSONPlaceholder.</p>
        </div>
        <!-- Botones que disparan cada forma de consumir la API. -->
        <div class="btn-group" role="group" aria-label="Metodos de carga">
          <button class="btn btn-primary" id="fetchBtn" type="button">Usar fetch</button>
          <button class="btn btn-outline-primary" id="axiosBtn" type="button">Usar axios</button>
        </div>
      </div>

      <!-- Mensaje de estado y contenedor donde se renderizan los usuarios. -->
      <div class="alert alert-info status-box" id="status">Elegir un metodo para cargar los usuarios.</div>
      <section class="row g-3" id="usersList" aria-live="polite"></section>
    </main>

    <!-- Axios desde CDN para resolver la segunda parte del punto. -->
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.7/dist/axios.min.js"></script>
    <!-- Script del modo claro/oscuro. -->
    <script src="/assets/theme.js"></script>
    <!-- Logica propia de la actividad 1. -->
    <script src="script.js"></script>
  </body>
</html>
