<!doctype html>
<!-- Pagina unica de la actividad 2. -->
<html lang="es" data-bs-theme="light">
  <head>
    <!-- Configuracion base del documento. -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Actividad 2 - POST</title>
    <!-- Bootstrap para formularios y grilla responsive. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Estilos propios compartidos. -->
    <link rel="stylesheet" href="/assets/common.css">
  </head>
  <body>
    <!-- Barra superior con boton de modo claro/oscuro. -->
    <nav class="navbar navbar-expand-lg border-bottom bg-body">
      <div class="container">
        <span class="navbar-brand fw-bold">Actividad 2</span>
        <button class="btn btn-outline-secondary btn-sm" id="themeToggle" type="button">Modo oscuro</button>
      </div>
    </nav>

    <!-- Contenido principal dividido en formulario y respuesta. -->
    <main class="container py-4 py-lg-5">
      <div class="row g-4 align-items-start">
        <!-- Columna izquierda: formulario solicitado por la consigna. -->
        <section class="col-lg-7">
          <p class="text-uppercase text-primary fw-semibold small mb-1">Actividad 2</p>
          <h1 class="h2 fw-bold mb-2">Enviar datos con POST</h1>
          <p class="muted">El formulario envia nombre y email a JSONPlaceholder y muestra el ID que devuelve la API.</p>

          <!-- Formulario con campos nombre y email. -->
          <form class="result-card" id="userForm" novalidate>
            <div>
              <label class="form-label" for="name">Nombre</label>
              <input class="form-control" id="name" name="name" type="text" placeholder="Ej: Sofia Perez" required>
              <div class="invalid-feedback">El nombre no puede tener numeros, comas ni puntos.</div>
            </div>
            <div>
              <label class="form-label" for="email">Email</label>
              <input class="form-control" id="email" name="email" type="email" placeholder="sofia@email.com" required>
              <div class="invalid-feedback">El email debe contener un @.</div>
            </div>
            <!-- Dos botones para elegir si se envia con axios o fetch. -->
            <div class="d-flex flex-wrap gap-2">
              <button class="btn btn-primary" type="submit" data-method="axios">Enviar con axios</button>
              <button class="btn btn-outline-primary" type="submit" data-method="fetch">Enviar con fetch</button>
            </div>
          </form>
        </section>

        <!-- Columna derecha: muestra el resultado del POST. -->
        <aside class="col-lg-5">
          <div class="result-card">
            <span class="badge text-bg-secondary align-self-start">Respuesta</span>
            <div id="responseBox" class="status-box muted">Todavia no se envio ningun dato.</div>
          </div>
        </aside>
      </div>
    </main>

    <!-- Axios desde CDN para enviar el POST con axios.post(). -->
    <script src="https://cdn.jsdelivr.net/npm/axios@1.7.7/dist/axios.min.js"></script>
    <!-- Script compartido para el tema claro/oscuro. -->
    <script src="/assets/theme.js"></script>
    <!-- Logica propia del formulario. -->
    <script src="script.js"></script>
  </body>
</html>
