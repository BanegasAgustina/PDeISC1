<!doctype html>
<!-- Pagina unica de la actividad 3. -->
<html lang="es" data-bs-theme="dark">

<head>
  <!-- Configuracion responsive y codificacion. -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Actividad 3 - Buscar usuarios</title>
  <!-- Bootstrap para diseno responsive. -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Estilos propios. -->
  <link rel="stylesheet" href="/assets/common.css">
</head>

<body>
  <!-- Barra superior con cambio de tema. -->
  <nav class="navbar navbar-expand-lg border-bottom bg-body">
    <div class="container-fluid px-4">
      <span class="navbar-brand fw-bold">Actividad 3</span>
      <button class="btn btn-outline-secondary btn-sm" id="themeToggle" type="button">Modo oscuro</button>
    </div>
  </nav>

  <!-- Contenido principal de busqueda. -->
  <main class="container-fluid px-4 py-4 py-lg-5">
    <div class="toolbar mb-4">
      <!-- Titulo de la actividad. -->
      <div>
        <p class="text-uppercase text-primary fw-semibold small mb-1">Actividad 3</p>
        <h1 class="h2 fw-bold mb-1">Buscar usuarios por nombre o nombre de usuario</h1>
      </div>
      <!-- Campo de texto que filtra mientras se escribe. -->
      <div class="col-12 col-md-5 col-lg-4">
        <label class="form-label" for="search">Buscar</label>
        <input class="form-control" id="search" type="search" placeholder="Escribir un nombre o nombre de usuario..."
          disabled>
      </div>
    </div>

    <!-- Estado de carga y listado de usuarios filtrados. -->
    <div class="alert alert-info status-box" id="status">Cargando usuarios...</div>
    <section class="row g-3" id="usersList" aria-live="polite"></section>
  </main>

  <!-- Botón para volver arriba -->
  <button id="scrollToTop" title="Volver arriba">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
      <path fill-rule="evenodd"
        d="M8 15a.5.5 0 0 0 .5-.5V2.707l3.146 3.147a.5.5 0 0 0 .708-.708l-4-4a.5.5 0 0 0-.708 0l-4 4a.5.5 0 1 0 .708.708L7.5 2.707V14.5a.5.5 0 0 0 .5.5z" />
    </svg>
  </button>
  <!-- Script compartido para modo claro/oscuro. -->
  <script src="/assets/theme.js"></script>
  <!-- Logica de carga y filtrado. -->
  <script src="script.js"></script>
</body>

</html>
