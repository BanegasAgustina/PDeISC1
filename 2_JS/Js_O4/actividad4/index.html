<!doctype html>
<!-- Pagina unica de la actividad 4. -->
<html lang="es" data-bs-theme="dark">
  <head>
    <!-- Configuracion base del documento. -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Actividad 4 - API local</title>
    <!-- Bootstrap para estilos y grilla responsive. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Estilos propios compartidos. -->
    <link rel="stylesheet" href="/assets/common.css">
  </head>
  <body>
    <!-- Barra superior con cambio de tema. -->
    <nav class="navbar navbar-expand-lg border-bottom bg-body">
      <div class="container-fluid px-4">
        <span class="navbar-brand fw-bold">Actividad 4</span>
        <button class="btn btn-outline-secondary btn-sm" id="themeToggle" type="button">Modo oscuro</button>
      </div>
    </nav>

    <!-- Contenido principal que consume la API local. -->
    <main class="container-fluid px-4 py-4 py-lg-5">
      <div class="toolbar mb-4">
        <!-- Titulo y descripcion de la API local. -->
        <div>
          <p class="text-uppercase text-primary fw-semibold small mb-1">Actividad 4</p>
          <h1 class="h2 fw-bold mb-1">API simple con Node.js</h1>
          <p class="muted mb-0">Esta pagina consume la ruta local <code>/api/alumnos</code>.</p>
        </div>
        <!-- Boton para volver a pedir los datos al servidor. -->
        <button class="btn btn-primary" id="reloadBtn" type="button">Recargar datos</button>
      </div>

      <div class="row g-4 align-items-start">
        <!-- Formulario que envia un nuevo alumno con metodo POST. -->
        <section class="col-lg-4">
          <form class="result-card premium-panel" id="studentForm" novalidate>
            <span class="badge text-bg-primary align-self-start">POST</span>
            <h2 class="h5 fw-bold mb-0">Agregar alumno</h2>
            <div>
              <label class="form-label" for="studentName">Nombre</label>
              <input class="form-control" id="studentName" name="nombre" type="text" placeholder="Ej: Laura Gomez" required>
              <div class="invalid-feedback">El nombre no puede tener numeros, comas ni puntos.</div>
            </div>
            <div>
              <label class="form-label" for="studentEmail">Email</label>
              <input class="form-control" id="studentEmail" name="email" type="email" placeholder="laura@email.com" required>
              <div class="invalid-feedback">El email debe contener un @.</div>
            </div>
            <button class="btn btn-primary w-100" type="submit">Guardar con POST</button>
          </form>
        </section>

        <!-- Estado y tarjetas con alumnos devueltos por /api/alumnos. -->
        <section class="col-lg-8">
          <div class="alert alert-info status-box" id="status">Cargando alumnos...</div>
          <div class="row g-3" id="studentsList" aria-live="polite"></div>
        </section>
      </div>
    </main>

    <!-- Botón para volver arriba -->
    <button id="scrollToTop" title="Volver arriba">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
        <path fill-rule="evenodd" d="M8 15a.5.5 0 0 0 .5-.5V2.707l3.146 3.147a.5.5 0 0 0 .708-.708l-4-4a.5.5 0 0 0-.708 0l-4 4a.5.5 0 1 0 .708.708L7.5 2.707V14.5a.5.5 0 0 0 .5.5z"/>
      </svg>
    </button>
    <!-- Script compartido para modo claro/oscuro. -->
    <script src="/assets/theme.js"></script>
    <!-- Logica propia para consumir la API local. -->
    <script src="script.js"></script>
  </body>
</html>
